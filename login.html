<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITBRO | ACCESS</title>
    <link rel="stylesheet" href="landing-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="premium-theme">
    <div class="main-container">
        <div class="auth-card">
            <h2>ACCESS GATE</h2>
            <p>Sync your operative profile.</p>

            <form class="vanguard-form">
                <div class="input-field">
                    <label>OPERATIVE_EMAIL</label>
                    <input type="email" placeholder="name@email.com" required>
                </div>
                <div class="input-field">
                    <label>SECURE_KEY</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="primary-btn">INITIALIZE</button>
            </form>
            <a href="/" class="text-btn">← RETURN TO BASE</a>
        </div>
    </div>
</body>
</html>
