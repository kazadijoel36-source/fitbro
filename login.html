    </div>

    <script>
        let isSignup = false;
        const base = "http://127.0.0.1:8000";

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('m-title');
            const btn = document.getElementById('auth-btn');
            const label = document.getElementById('toggle-label');
            const status = document.getElementById('status-tag');

            if (isSignup) {
                title.innerText = "VANGUARD_ENLIST";
                btn.innerText = "CREATE_OPERATIVE_ID";
                label.innerHTML = "EXISTING OPERATIVE? <b>AUTH_LOGIN</b>";
                status.innerText = "NEW_ENLISTMENT_PENDING";
            } else {
                title.innerText = "VANGUARD_AUTH";
                btn.innerText = "INITIALIZE_LINK";
                label.innerHTML = "NEW RECRUIT? <b>ENLIST_HERE</b>";
                status.innerText = "SECURE_LINK_AWAITING";
            }
        }

        async function executeAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('auth-btn');

            if (!email || !password) {
                alert("CRITICAL: Credentials missing.");
                return;
            }

            btn.innerText = "SYNCING...";
            btn.disabled = true;

            try {
                // Change this:
const endpoint = isSignup ? `${API_BASE}/signup` : `${API_BASE}/login`;
const res = await fetch(endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password })
});

                const data = await res.json();

                if (res.ok) {
                    // Store the User ID for all modular JS files to use
                    localStorage.setItem('fitbro_user_id', data.user_id);
                    
                    // Route to Onboarding for new users, Dashboard for veterans
                    window.location.href = isSignup ? "onboarding.html" : "dashboard.html";
                } else {
                    alert(`AUTH_ERROR: ${data.detail || "ACCESS_DENIED"}`);
                    btn.innerText = isSignup ? "CREATE_OPERATIVE_ID" : "INITIALIZE_LINK";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error("LINK_FAILURE:", e);
                alert("SYSTEM_OFFLINE: Ensure Python Backend is Running.");
                btn.disabled = false;
            }
        }

        // Custom Cursor HUD
        document.addEventListener('mousemove', (e) => {
            const c = document.getElementById('custom-cursor');
            if(c) {
                c.style.left = e.clientX + 'px';
                c.style.top = e.clientY + 'px';
            }
        });
    </script>
</body>
