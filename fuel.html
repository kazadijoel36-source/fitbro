<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard OS | Fuel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="vanguard-theme">
    <div id="custom-cursor"></div>

    <div class="container">
        <span class="tag">Sector_02: Resource_Intake</span>
        <h2 style="margin-bottom:20px;">Nutrition <span style="color:var(--primary)">Vault</span></h2>

        <div class="card" style="border-color: var(--danger); background: rgba(255,71,87,0.1);">
            <span class="tag" style="color:var(--danger)">Bio-Hazard_Alert</span>
            <p style="color:var(--danger); font-size: 0.75rem; font-weight: bold; line-height: 1.4;">
                LACTOSE_INTOLERANCE_ACTIVE. <br>
                DAIRY_FUEL_IS_PROHIBITED_FOR_OPERATIVE_01.
            </p>
        </div>

        <div class="card">
    <span class="tag">Fuel_Sync_Input</span>
    <input type="text" id="food-input" placeholder="ENTER_MEAL">
    <button class="btn-execute" onclick="syncFuel()">SYNC_TO_VAULT</button>
</div>

<div class="card">
    <span class="tag">Mission_History</span>
    <div id="m-list"> </div>
</div>

<script src="nutrition-logic.js"></script>

        <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div class="card" style="margin-bottom:0; text-align:center;">
                <span class="tag">Daily_KCAL</span>
                <span id="total-kcal" style="font-family:'Archivo Black'; font-size:1.2rem; color:var(--primary)">0</span>
            </div>
            <div class="card" style="margin-bottom:0; text-align:center;">
                <span class="tag">Records</span>
                <span id="meal-count" style="font-family:'Archivo Black'; font-size:1.2rem; color:var(--blue)">0</span>
            </div>
        </div>

        <div class="card">
            <span class="tag">Mission_History</span>
            <div id="m-list" style="margin-top:10px;">
                <div style="text-align:center; padding:20px; color:#444;">INITIALIZING_VAULT...</div>
            </div>
        </div>
    </div>

    <nav class="nav-dock">
        <a href="dashboard.html" class="nav-link"><span>🏠</span>HOME</a>
        <a href="chamber.html" class="nav-link"><span>⚔️</span>CHAMBER</a>
        <a href="fuel.html" class="nav-link active"><span>🥗</span>FUEL</a>
        <a href="medals.html" class="nav-link"><span>🎖️</span>MEDALS</a>
    </nav>

    <script src="nutrition-logic.js"></script>
